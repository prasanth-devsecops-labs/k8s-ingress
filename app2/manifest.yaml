apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  # Labels for the Deployment object itself
  labels:
    project: roboshop
    purpose: replicaset-demo
    tier: frontend
    component: app2
  annotations:
    # Appears in 'kubectl rollout history'
    kubernetes.io/change-cause: "moving to 1.29.7"
spec:
  replicas: 2
  selector:
    # The Deployment uses these to find and manage its Pods
    matchLabels:
      project: roboshop
      purpose: replicaset-demo
      tier: frontend
      component: app2
  # Template defines the Pods that will be created
  template:
    metadata:
      # These MUST match the 'selector' labels above
      labels:
        project: roboshop
        purpose: replicaset-demo
        tier: frontend
        component: app2
    spec:
      containers:
      - name: app2
        image: "prasanthreddymps/app2:1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  clusterIP: None
  selector:
    # labels are used as selectors
    project: roboshop
    tier: frontend
    component: app2
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:334602727445:certificate/8f26d292-74d0-4232-8bce-b5f91c54331d'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: roboshop
spec:
  ingressClassName: alb
  rules:
  - host: "app2.prashum.online"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app2
            port:
              number: 80